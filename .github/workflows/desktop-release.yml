name: Desktop builds

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: synchub-desktop-windows-x64
            platform: windows-x64
            extension: zip
          - name: Ubuntu x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: synchub-desktop-linux-x64
            platform: linux-x64
            extension: tar.gz
          - name: macOS arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: synchub-desktop-macos-arm64
            platform: macos-arm64
            extension: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: metadata
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw Cargo.toml
          if ($manifest -notmatch '(?m)^version\s*=\s*"(?<version>[^"]+)"') {
              throw "Cargo.toml package version was not found"
          }
          $version = $Matches.version
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "v$version") {
              throw "release tag ${{ github.ref_name }} does not match Cargo.toml version $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "archive=synchub-desktop-$version-${{ matrix.platform }}" >> $env:GITHUB_OUTPUT

      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            clang cmake pkg-config libasound2-dev libfontconfig1-dev libssl-dev libx11-xcb-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "${{ steps.metadata.outputs.archive }}"
          New-Item -ItemType Directory -Force "dist/$archive" | Out-Null
          Copy-Item target/${{ matrix.target }}/release/synchub-desktop.exe "dist/$archive/"
          Copy-Item README.md "dist/$archive/"
          Compress-Archive -Path "dist/$archive" -DestinationPath "dist/$archive.zip"

      - name: Stage Ubuntu artifact
        if: runner.os == 'Linux'
        run: |
          archive="${{ steps.metadata.outputs.archive }}"
          mkdir -p "dist/$archive"
          cp target/${{ matrix.target }}/release/synchub-desktop README.md "dist/$archive/"
          chmod +x "dist/$archive/synchub-desktop"
          tar -C dist -czf "dist/$archive.tar.gz" "$archive"

      - name: Stage macOS application
        if: runner.os == 'macOS'
        run: |
          archive="${{ steps.metadata.outputs.archive }}"
          app="dist/$archive/SyncHub Desktop.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp target/${{ matrix.target }}/release/synchub-desktop "$app/Contents/MacOS/SyncHub Desktop"
          cp README.md "dist/$archive/"
          version="${{ steps.metadata.outputs.version }}"
          iconset="dist/SyncHub.iconset"
          mkdir -p "$iconset"
          sips -z 16 16 resources/icons/icon-256.png --out "$iconset/icon_16x16.png" >/dev/null
          sips -z 32 32 resources/icons/icon-256.png --out "$iconset/icon_16x16@2x.png" >/dev/null
          sips -z 32 32 resources/icons/icon-256.png --out "$iconset/icon_32x32.png" >/dev/null
          sips -z 64 64 resources/icons/icon-256.png --out "$iconset/icon_32x32@2x.png" >/dev/null
          sips -z 128 128 resources/icons/icon-256.png --out "$iconset/icon_128x128.png" >/dev/null
          cp resources/icons/icon-256.png "$iconset/icon_128x128@2x.png"
          cp resources/icons/icon-256.png "$iconset/icon_256x256.png"
          sips -z 512 512 resources/icons/icon-256.png --out "$iconset/icon_256x256@2x.png" >/dev/null
          sips -z 512 512 resources/icons/icon-256.png --out "$iconset/icon_512x512.png" >/dev/null
          sips -z 1024 1024 resources/icons/icon-256.png --out "$iconset/icon_512x512@2x.png" >/dev/null
          iconutil -c icns "$iconset" -o "$app/Contents/Resources/SyncHub.icns"
          cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleDisplayName</key><string>SyncHub Desktop</string>
            <key>CFBundleExecutable</key><string>SyncHub Desktop</string>
            <key>CFBundleIdentifier</key><string>app.likanug.synchub.desktop</string>
            <key>CFBundleIconFile</key><string>SyncHub</string>
            <key>CFBundleName</key><string>SyncHub Desktop</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${version}</string>
          </dict></plist>
          PLIST
          plutil -lint "$app/Contents/Info.plist"
          ditto -c -k --sequesterRsrc --keepParent "dist/$archive" "dist/$archive.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ steps.metadata.outputs.archive }}.${{ matrix.extension }}
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.zip *.tar.gz > SHA256SUMS.txt
      - name: Generate changelog
        shell: pwsh
        run: ./scripts/generate-changelog.ps1 -Tag "${{ github.ref_name }}" -OutputPath "dist/CHANGELOG.md"
      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/CHANGELOG.md
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS.txt
            dist/CHANGELOG.md
