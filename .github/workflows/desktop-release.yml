name: Desktop builds

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: synchub-desktop-windows-x64
          - name: Ubuntu x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: synchub-desktop-linux-x64
          - name: macOS arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: synchub-desktop-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            clang cmake libasound2-dev libfontconfig1-dev libx11-xcb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/${{ matrix.artifact }} | Out-Null
          Copy-Item target/${{ matrix.target }}/release/synchub-desktop.exe dist/${{ matrix.artifact }}/
          Copy-Item README.md dist/${{ matrix.artifact }}/
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Stage Ubuntu artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/synchub-desktop README.md dist/${{ matrix.artifact }}/
          chmod +x dist/${{ matrix.artifact }}/synchub-desktop
          tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Stage macOS application
        if: runner.os == 'macOS'
        run: |
          app="dist/${{ matrix.artifact }}/SyncHub Desktop.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp target/${{ matrix.target }}/release/synchub-desktop "$app/Contents/MacOS/SyncHub Desktop"
          cp README.md "dist/${{ matrix.artifact }}/"
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          iconset="dist/SyncHub.iconset"
          mkdir -p "$iconset"
          sips -z 16 16 resources/icons/icon-256.png --out "$iconset/icon_16x16.png" >/dev/null
          sips -z 32 32 resources/icons/icon-256.png --out "$iconset/icon_16x16@2x.png" >/dev/null
          sips -z 32 32 resources/icons/icon-256.png --out "$iconset/icon_32x32.png" >/dev/null
          sips -z 64 64 resources/icons/icon-256.png --out "$iconset/icon_32x32@2x.png" >/dev/null
          sips -z 128 128 resources/icons/icon-256.png --out "$iconset/icon_128x128.png" >/dev/null
          cp resources/icons/icon-256.png "$iconset/icon_128x128@2x.png"
          cp resources/icons/icon-256.png "$iconset/icon_256x256.png"
          sips -z 512 512 resources/icons/icon-256.png --out "$iconset/icon_256x256@2x.png" >/dev/null
          sips -z 512 512 resources/icons/icon-256.png --out "$iconset/icon_512x512.png" >/dev/null
          sips -z 1024 1024 resources/icons/icon-256.png --out "$iconset/icon_512x512@2x.png" >/dev/null
          iconutil -c icns "$iconset" -o "$app/Contents/Resources/SyncHub.icns"
          cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleDisplayName</key><string>SyncHub Desktop</string>
            <key>CFBundleExecutable</key><string>SyncHub Desktop</string>
            <key>CFBundleIdentifier</key><string>app.likanug.synchub.desktop</string>
            <key>CFBundleIconFile</key><string>SyncHub</string>
            <key>CFBundleName</key><string>SyncHub Desktop</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${version}</string>
          </dict></plist>
          PLIST
          plutil -lint "$app/Contents/Info.plist"
          ditto -c -k --sequesterRsrc --keepParent "dist/${{ matrix.artifact }}" "dist/${{ matrix.artifact }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz
